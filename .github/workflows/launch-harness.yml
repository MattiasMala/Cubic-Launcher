# Launch-verification harness — ADVISORY (not a gate yet).
#
# Runs the Stratum-A ("ci") matrix as a SMOKE check under Xvfb: successAfter uses
# the launcher default (15s), with NO ≥10s-in-world claim — in-world rendering
# under llvmpipe (no GPU) is a known flake source and is confined to local/GPU
# runs (see scripts/launch-harness/launch-harness-design intent).
#
# continue-on-error keeps this advisory: it never blocks a PR. Promote to a gate
# only once it has demonstrated stability. Triggers: manual + weekly, NOT on
# every push (a full real-launch matrix is far too costly for per-push CI).
name: launch-harness

on:
  workflow_dispatch:
    inputs:
      scope:
        description: "matrix scope"
        default: "ci"
        type: choice
        options: ["ci"]
      success_after:
        description: "successAfterSeconds (smoke; not in-world >=10s)"
        default: "15"
        type: string
  schedule:
    # Weekly, Monday 05:00 UTC.
    - cron: "0 5 * * 1"

permissions:
  contents: read

jobs:
  smoke:
    runs-on: ubuntu-latest
    continue-on-error: true # ADVISORY: never blocks the PR/branch.
    timeout-minutes: 240
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      # Tauri + Xvfb system dependencies (webkit2gtk 4.1, gtk, xvfb, mesa sw GL).
      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            xvfb \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libasound2t64 \
            mesa-utils libgl1-mesa-dri

      - name: Cargo cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: harness-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: harness-cargo-

      # Cache downloaded Java runtimes + Minecraft assets between runs so the
      # ~14GB runner does not re-download every week. Keyed loosely so it warms
      # over time; the harness re-validates hashes regardless.
      - name: Launcher asset cache
        uses: actions/cache@v4
        with:
          path: /tmp/harness-xdg
          key: harness-assets-${{ github.run_id }}
          restore-keys: harness-assets-

      - name: Build launcher binary
        run: cargo build --bin cubic_launcher --manifest-path src-tauri/Cargo.toml

      - name: Run advisory smoke matrix (Stratum A, Xvfb)
        env:
          SCOPE: ${{ github.event.inputs.scope || 'ci' }}
          SUCCESS_AFTER: ${{ github.event.inputs.success_after || '15' }}
        run: |
          python3 scripts/launch-harness/run_matrix.py \
            --scope "$SCOPE" \
            --display xvfb \
            --success-after "$SUCCESS_AFTER" \
            --timeout 900 \
            --report-dir scripts/launch-harness/reports \
            --binary src-tauri/target/debug/cubic_launcher

      - name: Upload matrix report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: launch-harness-report
          path: scripts/launch-harness/reports/
          if-no-files-found: warn
